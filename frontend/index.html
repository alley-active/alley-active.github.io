<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика Discord чата</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #2c2f33;
            color: #ffffff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #23272a;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .stats-header {
            background-color: #7289da;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background-color: #2f3136;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card h3 {
            margin: 0 0 10px 0;
            color: #7289da;
        }
        .stat-card p {
            font-size: 24px;
            margin: 0;
            font-weight: bold;
        }
        .users-list {
            background-color: #2f3136;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .users-list h2 {
            margin: 0 0 20px 0;
            color: #7289da;
        }
        .user-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 15px;
            padding: 12px;
            border-bottom: 1px solid #40444b;
            align-items: center;
            transition: background-color 0.2s;
        }
        .user-row:hover {
            background-color: #36393f;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #7289da;
        }
        .user-name {
            font-weight: bold;
        }
        .message-count {
            color: #7289da;
            font-weight: bold;
        }
        .chart-container {
            background-color: #2f3136;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .time-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .time-btn {
            background-color: #7289da;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .time-btn:hover {
            background-color: #5b6eae;
            transform: translateY(-2px);
        }
        .time-btn.active {
            background-color: #5b6eae;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #error-message {
            display: none;
            background-color: #f04747;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .loading {
            position: relative;
            opacity: 0.7;
        }
        .loading::after {
            content: "Загрузка...";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 1000;
        }
        .refresh-button {
            background-color: #43b581;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .refresh-button:hover {
            background-color: #3ca374;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats-header">
            <h1>Статистика активности Discord</h1>
            <p>Обновлено: <span id="last-update">Сейчас</span></p>
        </div>

        <div id="error-message"></div>

        <div class="stats">
            <div class="stat-card">
                <h3>Всего сообщений</h3>
                <p id="total-messages">0</p>
            </div>
            <div class="stat-card">
                <h3>Активных участников</h3>
                <p id="active-users">0</p>
            </div>
            <div class="stat-card">
                <h3>Сообщений сегодня</h3>
                <p id="today-messages">0</p>
            </div>
        </div>

        <div class="time-selector">
            <button class="time-btn active" data-period="day">День</button>
            <button class="time-btn" data-period="week">Неделя</button>
            <button class="time-btn" data-period="month">Месяц</button>
        </div>

        <button class="refresh-button" onclick="refreshData()">Обновить данные</button>

        <div class="users-list">
            <h2>Топ участников</h2>
            <div id="user-list"></div>
        </div>

        <div class="chart-container">
            <canvas id="activityChart"></canvas>
        </div>
    </div>

    <script>
        let currentChart = null;
        let currentPeriod = 'day';
        
        const baseUrl = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000' 
            : 'https://your-railway-url.railway.app';

        function showError(message) {
            const errorElement = document.getElementById('error-message');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            setTimeout(() => {
                errorElement.style.display = 'none';
            }, 5000);
        }

        function hideError() {
            document.getElementById('error-message').style.display = 'none';
        }

        function showLoading() {
            document.querySelector('.container').classList.add('loading');
        }

        function hideLoading() {
            document.querySelector('.container').classList.remove('loading');
        }

        async function fetchStats(period) {
            try {
                showLoading();
                hideError();
                
                const response = await fetch(`${baseUrl}/stats?period=${period}`);
                if (!response.ok) throw new Error("Ошибка получения данных");
                
                const data = await response.json();
                return data;
            } catch (error) {
                showError(`Ошибка: ${error.message}`);
                return null;
            } finally {
                hideLoading();
            }
        }

        function renderStats(data) {
            document.getElementById('total-messages').textContent = data.total_messages.toLocaleString();
            document.getElementById('active-users').textContent = data.active_users.toLocaleString();
            document.getElementById('today-messages').textContent = data.today_messages.toLocaleString();
            document.getElementById('last-update').textContent = new Date().toLocaleString();

            const userList = document.getElementById('user-list');
            userList.innerHTML = "";
            
            data.top_users.forEach((user, index) => {
                const userRow = document.createElement('div');
                userRow.className = 'user-row';
                userRow.innerHTML = `
                    <div class="user-avatar" style="background-color: ${getRandomColor()}"></div>
                    <div class="user-name">${user.username}</div>
                    <div class="message-count">${user.message_count.toLocaleString()} сообщений</div>
                `;
                userList.appendChild(userRow);
            });
        }

        function getRandomColor() {
            const colors = ['#7289da', '#43b581', '#faa61a', '#f04747', '#2f3136'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function renderChart(data) {
            const ctx = document.getElementById('activityChart').getContext('2d');
            
            if (currentChart) {
                currentChart.destroy();
            }

            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.activity.map(day => new Date(day.date).toLocaleDateString()),
                    datasets: [{
                        label: 'Сообщения',
                        data: data.activity.map(day => day.count),
                        borderColor: '#7289da',
                        backgroundColor: 'rgba(114, 137, 218, 0.2)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#ffffff'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: '#ffffff'
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            },
                            ticks: {
                                color: '#ffffff'
                            },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        async function updateStats(period) {
            currentPeriod = period;
            const data = await fetchStats(period);
            if (data) {
                renderStats(data);
                renderChart(data);
            }
        }

        async function refreshData() {
            await updateStats(currentPeriod);
        }

        document.querySelectorAll('.time-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                const period = button.getAttribute('data-period');
                updateStats(period);
            });
        });

        // Автоматическое обновление данных каждые 5 минут
        setInterval(refreshData, 300000);

        // Инициализация
        updateStats('day');
    </script>
</body>
</html>
