<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика Discord чата</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #2c2f33;
            color: #ffffff;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #23272a;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .stats-header {
            background-color: #7289da;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background-color: #2f3136;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
        .users-list {
            background-color: #2f3136;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .user-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 15px;
            padding: 10px;
            border-bottom: 1px solid #40444b;
            align-items: center;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #7289da;
        }
        .user-name {
            font-weight: bold;
        }
        .message-count {
            color: #7289da;
            font-weight: bold;
        }
        .chart-container {
            margin-top: 20px;
            background-color: #2f3136;
            padding: 15px;
            border-radius: 5px;
        }
        .time-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .time-btn {
            background-color: #7289da;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        .time-btn:hover {
            background-color: #5b6eae;
        }
        .time-btn.active {
            background-color: #5b6eae;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats-header">
            <h1>Статистика активности Discord</h1>
            <p>Обновлено: <span id="last-update">Сейчас</span></p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Всего сообщений</h3>
                <p id="total-messages">0</p>
            </div>
            <div class="stat-card">
                <h3>Активных участников</h3>
                <p id="active-users">0</p>
            </div>
            <div class="stat-card">
                <h3>Сообщений сегодня</h3>
                <p id="today-messages">0</p>
            </div>
        </div>

        <div class="time-selector">
            <button class="time-btn active">День</button>
            <button class="time-btn">Неделя</button>
            <button class="time-btn">Месяц</button>
        </div>

        <div class="users-list">
            <h2>Топ участников</h2>
            <div class="user-row">
                <div class="user-avatar"></div>
                <div class="user-name">Example User #1</div>
                <div class="message-count">1234 сообщений</div>
            </div>
            <div class="user-row">
                <div class="user-avatar"></div>
                <div class="user-name">Example User #2</div>
                <div class="message-count">987 сообщений</div>
            </div>
            <div class="user-row">
                <div class="user-avatar"></div>
                <div class="user-name">Example User #3</div>
                <div class="message-count">754 сообщений</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="activityChart"></canvas>
        </div>
    </div>

    <script>
        // Создание графика активности
        const ctx = document.getElementById('activityChart').getContext('2d');
        const activityChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 24}, (_, i) => `${i}:00`),
                datasets: [{
                    label: 'Количество сообщений',
                    data: Array.from({length: 24}, () => Math.floor(Math.random() * 100)),
                    borderColor: '#7289da',
                    backgroundColor: 'rgba(114, 137, 218, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            color: '#ffffff'
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: '#ffffff'
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    },
                    x: {
                        ticks: {
                            color: '#ffffff'
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    }
                }
            }
        });

        // Обработчики для кнопок временных периодов
        document.querySelectorAll('.time-btn').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
                // Здесь будет код обновления данных для выбранного периода
            });
        });

        // Функция для обновления статистики
        function updateStats(data) {
            document.getElementById('total-messages').textContent = data.totalMessages;
            document.getElementById('active-users').textContent = data.activeUsers;
            document.getElementById('today-messages').textContent = data.todayMessages;
            document.getElementById('last-update').textContent = new Date().toLocaleString();
        }

        // Пример данных для тестирования
        updateStats({
            totalMessages: 12345,
            activeUsers: 42,
            todayMessages: 567
        });
    </script>
</body>
</html>
