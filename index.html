<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика Discord чата</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #2c2f33;
            color: #ffffff;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #23272a;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .stats-header {
            background-color: #7289da;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background-color: #2f3136;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
        .users-list {
            background-color: #2f3136;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .user-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 15px;
            padding: 10px;
            border-bottom: 1px solid #40444b;
            align-items: center;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #7289da;
        }
        .user-name {
            font-weight: bold;
        }
        .message-count {
            color: #7289da;
            font-weight: bold;
        }
        .chart-container {
            margin-top: 20px;
            background-color: #2f3136;
            padding: 15px;
            border-radius: 5px;
        }
        .time-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .time-btn {
            background-color: #7289da;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        .time-btn:hover {
            background-color: #5b6eae;
        }
        .time-btn.active {
            background-color: #5b6eae;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats-header">
            <h1>Статистика активности Discord</h1>
            <p>Обновлено: <span id="last-update">Сейчас</span></p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Всего сообщений</h3>
                <p id="total-messages">0</p>
            </div>
            <div class="stat-card">
                <h3>Активных участников</h3>
                <p id="active-users">0</p>
            </div>
            <div class="stat-card">
                <h3>Сообщений сегодня</h3>
                <p id="today-messages">0</p>
            </div>
        </div>

        <div class="time-selector">
            <button class="time-btn active" data-period="day">День</button>
            <button class="time-btn" data-period="week">Неделя</button>
            <button class="time-btn" data-period="month">Месяц</button>
        </div>

        <div class="users-list">
            <h2>Топ участников</h2>
        </div>

        <div class="chart-container">
            <canvas id="activityChart"></canvas>
        </div>
    </div>

    <script>
        const channelId = "1000757048406966426"; // Ваш ID канала
        const apiBaseUrl = "https://sanatnurasyl90.replit.com"; // URL вашего Replit

        // Загрузка статистики
        async function fetchStats(period) {
            const response = await fetch(`${apiBaseUrl}/stats?channel_id=${channelId}&period=${period}`);
            if (!response.ok) {
                console.error("Ошибка загрузки статистики:", await response.text());
                return null;
            }
            return await response.json();
        }

        // Обновление UI
        async function updateStats(period) {
            const data = await fetchStats(period);
            if (!data) return;

            document.getElementById('total-messages').textContent = data.total_messages;
            document.getElementById('today-messages').textContent = period === 'day' ? data.total_messages : 'N/A';
            document.getElementById('active-users').textContent = data.top_users.length;

            const userList = document.querySelector('.users-list');
            userList.innerHTML = '<h2>Топ участников</h2>';
            data.top_users.forEach(user => {
                const userRow = `
                    <div class="user-row">
                        <div class="user-avatar"></div>
                        <div class="user-name">${user.username}</div>
                        <div class="message-count">${user.message_count} сообщений</div>
                    </div>
                `;
                userList.innerHTML += userRow;
            });
        }

        // Обработчики для выбора периода
        document.querySelectorAll('.time-btn').forEach(button => {
            button.addEventListener('click', function () {
                document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
                const period = this.getAttribute('data-period');
                updateStats(period);
            });
        });

        // Инициализация
        updateStats('day');
    </script>
</body>
</html>
