name: Update Discord Stats

on:
  schedule:
    - cron: '*/2 * * * *'
  push: # Запускать при каждом push
  workflow_dispatch: # Добавляет кнопку ручного запуска

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16 # или более новая версия

      - name: Install dependencies
        run: npm install jsdom chart.js chartjs-node-canvas

      - name: Copy exported HTML (Create exported_chat_example.html in your repo!)
        run: cp exported_chat_example.html exported_chat.html

      - name: Run stats processing script
        run: node process_stats.js

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Update Discord stats
          branch: main # Или ваша основная ветка
          commit_options: '--no-gpg-sign' # Отключаем подпись GPG (может вызывать проблемы)
